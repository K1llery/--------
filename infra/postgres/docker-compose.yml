version: "3.9"
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: travel-system-postgres
    environment:
      POSTGRES_DB: travel_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_system"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
